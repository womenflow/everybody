<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Mindset shift from earning summer to joyful movement">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="36" y="42" font-size="24" font-weight="700" fill="#1a1a1a">The Mindset Shift</text>
  <text x="36" y="65" font-size="14" fill="#6b7280">You don't need to "earn" summer — move for joy, not punishment</text>
  <!-- before -->
  <rect x="36" y="92" width="290" height="200" rx="12" fill="#f7efec" stroke="#e6d3cb"/>
  <text x="181" y="122" font-size="15" font-weight="700" fill="#a05a45" text-anchor="middle">Movement as PUNISHMENT</text>
  <line x1="60" y1="136" x2="302" y2="136" stroke="#e6d3cb"/>
  <g font-size="13" fill="#7a5346">
    <text x="60" y="162">✗  "Earn" your food</text>
    <text x="60" y="190">✗  Shrink to deserve summer</text>
    <text x="60" y="218">✗  Guilt, numbers, dread</text>
    <text x="60" y="246">✗  A chore you resent</text>
    <text x="60" y="274">✗  Doesn't last</text>
  </g>
  <!-- arrow -->
  <text x="360" y="200" font-size="34" fill="#1f6f43" text-anchor="middle">→</text>
  <!-- after -->
  <rect x="394" y="92" width="290" height="200" rx="12" fill="#e9f4ee" stroke="#c4e2d1"/>
  <text x="539" y="122" font-size="15" font-weight="700" fill="#1f6f43" text-anchor="middle">Movement as a GIFT</text>
  <line x1="418" y1="136" x2="660" y2="136" stroke="#c4e2d1"/>
  <g font-size="13" fill="#2f5c45">
    <text x="418" y="162">✓  Dance in your kitchen</text>
    <text x="418" y="190">✓  Swim just because it feels good</text>
    <text x="418" y="218">✓  Walk with no step goal</text>
    <text x="418" y="246">✓  Rest when you're tired</text>
    <text x="418" y="274">✓  Fun — reason enough</text>
  </g>
  <rect x="36" y="308" width="648" height="34" rx="8" fill="#e9f4ee"/>
  <text x="360" y="330" font-size="13.5" font-weight="700" fill="#1f6f43" text-anchor="middle">Every body is a "fitness body." Take up space. Wear the swimsuit.</text>
</svg>